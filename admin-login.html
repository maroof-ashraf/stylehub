<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | StyleHub</title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
        }
        .auth-container {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .auth-header h1 { color: white; }
        .auth-header p { color: #94a3b8; }
        .form-group label { color: #cbd5e1; }
        .form-group input { 
            background: #0f172a; 
            border-color: #334155; 
            color: white; 
        }
        .btn-primary { background: #4f46e5; }
        .btn-google { 
            background: #1e293b; 
            color: white; 
            border-color: #334155; 
        }
        .divider { color: #475569; }
        .divider::before, .divider::after { background: #334155; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Admin Panel</h1>
            <p>Please authenticate to continue</p>
        </div>
        
        <form id="admin-login-form">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" placeholder="admin@stylehub.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary">Enter Dashboard</button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <button id="google-login" class="btn btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Sign in with Google Admin
        </button>

        <div class="auth-footer">
            <a href="index.html" style="color: #94a3b8;">← Return to Storefront</a>
        </div>
    </div>

    <script type="module" src="admin-login.js"></script>
</body>
</html>
